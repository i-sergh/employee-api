<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редактирование сотрудника</title>
    <link rel="stylesheet" href="{{ url_for('static', path='css/employee/edit.css') }}">
</head>
<body>
    <div class="container">
        <h1>Редактирование сотрудника</h1>
        <div class="employee-header">
            <div class="avatar-large">
                <img id="avatarImage" src="#" alt="Аватар сотрудника" >
            </div>
            <div class="employee-other">
                <span class="employee-status" id="employeeStatus"></span>
            </div>
        </div>
        <form id="editForm" enctype="multipart/form-data">
            <input type="hidden" id="employeeId" value="{{ employee_id }}"> <!-- ТУТ ПОДСТАВЛЯЕМ ID -->

            <div class="form-grid">
                <div class="form-group">
                    <label for="lastName">Фамилия <span class="required">*</span></label>
                    <input type="text" id="lastName" name="last_name" required>
                </div>

                <div class="form-group">
                    <label for="firstName">Имя <span class="required">*</span></label>
                    <input type="text" id="firstName" name="first_name" required>
                </div>

                <div class="form-group">
                    <label for="middleName">Отчество</label>
                    <input type="text" id="middleName" name="middle_name">
                </div>

                <div class="form-group">
                    <label for="phone">Телефон <span class="required">*</span></label>
                    <input type="tel" id="phone" name="phone" placeholder="+71234567890" required>
                </div>

                <div class="form-group">
                    <label for="birthDate">Дата рождения <span class="required">*</span></label>
                    <input type="date" id="birthDate" name="birth_date" required>
                </div>

                <div class="form-group">
                    <label for="sex">Пол <span class="required">*</span></label>
                    <select id="sex" name="sex" required>
                        <option value="">Выберите пол</option>
                        <option value="муж.">Мужской</option>
                        <option value="жен.">Женский</option>
                    </select>
                </div>
            </div>

            <div class="form-group photo-group">
                <label for="photo">Фото</label>
                <div class="photo-upload-wrapper">
                    <input type="file" id="photo" name="photo" accept="image/*">
                    <span class="photo-hint">Макс. размер 200 КБ</span>
                </div>
                <div id="photoPreview">
                    <img id="photoPreviewImg" src="#" alt="Фото сотрудника" style="display: none;">
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary" id="saveBtn">Сохранить</button>
                <button type="button" class="btn btn-secondary" id="saveDraftBtn">Сохранить как черновик</button>
                <button type="button" class="btn btn-warning" id="cancelBtn">Отмена</button>
                <button type="button" class="btn btn-danger" id="deleteBtn">Удалить</button>
            </div>

            <div class="required-hint">* — обязательные поля</div>
        </form>
    </div>

    <script src="{{ url_for('static', path='js/employee/edit.js') }}" defer></script>
</body>
</html>
